name: update-rc-nightly

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: get current nightly rev
        id: current
        run: |
          set -euo pipefail
          rev=$(grep -oP 'rev = "\K[^"]+' pkgs/rc/nightly.nix)
          echo "rev=$rev" >> "$GITHUB_OUTPUT"

      - name: fetch latest master commit info
        id: master
        run: |
          set -euo pipefail
          commit_json=$(curl -fsSL https://api.github.com/repos/rakitzis/rc/commits/master)
          sha=$(echo "$commit_json" | jq -r '.sha')
          date=$(echo "$commit_json" | jq -r '.commit.committer.date' | cut -dT -f1)
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "date=$date" >> "$GITHUB_OUTPUT"

      - name: prefetch latest master
        if: steps.master.outputs.sha != steps.current.outputs.rev
        id: prefetch
        run: |
          set -euo pipefail
          url="https://github.com/rakitzis/rc/archive/${{ steps.master.outputs.sha }}.tar.gz"
          hash=$(nix store prefetch-file --json --unpack "$url" | jq -r '.hash')
          [[ "$hash" =~ ^sha256-[A-Za-z0-9+/=]+$ ]] || { echo "ERROR: bad hash '$hash'"; exit 1; }
          echo "hash=$hash" >> "$GITHUB_OUTPUT"

      - name: update nightly version, rev, and hash
        if: steps.master.outputs.sha != steps.current.outputs.rev
        run: |
          set -euo pipefail
          sed -i 's|version = "[^"]*";|version = "unstable-${{ steps.master.outputs.date }}";|' pkgs/rc/nightly.nix
          sed -i 's|rev = "[^"]*";|rev = "${{ steps.master.outputs.sha }}";|' pkgs/rc/nightly.nix
          sed -i 's|hash = "[^"]*";|hash = "${{ steps.prefetch.outputs.hash }}";|' pkgs/rc/nightly.nix

      - name: commit if changed
        if: steps.master.outputs.sha != steps.current.outputs.rev
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes."
            exit 0
          fi
          git add pkgs/rc/nightly.nix
          git commit -m "rc: update to unstable-${{ steps.master.outputs.date }} (${{ steps.prefetch.outputs.hash }})"
          git push
