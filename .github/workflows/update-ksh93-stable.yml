name: update-ksh93-stable

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: fetch latest stable release
        id: release
        run: |
          set -euo pipefail
          tag=$(curl -fsSL https://api.github.com/repos/ksh93/ksh/releases/latest | jq -r '.tag_name')
          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: get current stable version
        id: current
        run: |
          set -euo pipefail
          version=$(grep -oP 'version = "\K[^"]+' pkgs/ksh93/stable.nix)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: prefetch and update stable
        if: steps.release.outputs.version != steps.current.outputs.version
        id: prefetch
        run: |
          set -euo pipefail
          hash=$(nix-prefetch-git --url https://github.com/ksh93/ksh --rev "${{ steps.release.outputs.tag }}" | jq -r '.hash // .sha256')
          [[ "$hash" =~ ^sha256-[A-Za-z0-9+/=]+$ ]] || { echo "ERROR: bad hash '$hash'"; exit 1; }
          sed -i "s|version = \"[^\"]*\";|version = \"${{ steps.release.outputs.version }}\";|" pkgs/ksh93/stable.nix
          sed -i "s|hash = \"[^\"]*\";|hash = \"$hash\";|" pkgs/ksh93/stable.nix
          echo "hash=$hash" >> "$GITHUB_OUTPUT"

      - name: commit if changed
        if: steps.release.outputs.version != steps.current.outputs.version
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pkgs/ksh93/stable.nix
          git commit -m "ksh-stable: update to ${{ steps.release.outputs.version }} (${{ steps.prefetch.outputs.hash }})"
          git push
